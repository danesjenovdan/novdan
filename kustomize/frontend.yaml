apiVersion: apps/v1
kind: Deployment
metadata:
  name: novdan-frontend
  labels:
    app: novdan-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: novdan-frontend
  template:
    metadata:
      labels:
        app: novdan-frontend
    spec:
      containers:
        - name: novdan-frontend
          image: novdan-frontend
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: novdan-secrets
          resources:
            requests:
              memory: 100Mi
              cpu: 100m
            limits:
              memory: 100Mi
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: novdan-frontend
spec:
  selector:
    app: novdan-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-www
spec:
  redirectRegex:
    regex: ^https?://www.novdan.si/(.*)
    replacement: https://novdan.si/${1}
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novdan-frontend
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    traefik.ingress.kubernetes.io/router.middlewares: |
      traefik-redirect-to-https@kubernetescrd,
      novdan-redirect-www@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - novdan.si
        - www.novdan.si
      secretName: novdan-frontend-tls
  rules:
    - host: novdan.si
      http: &http_paths
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: novdan-frontend
                port:
                  number: 3000
    - host: www.novdan.si
      http: *http_paths
