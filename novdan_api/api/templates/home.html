<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Nov dan</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        text-align: center;
        background: #fff;
        color: #111;
      }

      p {
        margin: 0;
        font-size: 1.75rem;
        font-weight: 300;
      }

      a {
        color: #1d4ed8;
        font-weight: 500;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f3f4f6;
        }

        a {
          color: #60a5fa;
        }
      }
    </style>
  </head>
  <body>
    <p>
      Tukaj ni ničesar.<br />
      Pojdi na <a href="https://novdan.si">novdan.si</a>.
    </p>
  </body>
</html>
